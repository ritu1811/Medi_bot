<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI_BOT - AI Medical Assistant</title>
    <meta name="description" content="Advanced AI Medical Assistant chatbot interface.">
    <!-- Prevent favicon.ico 404 errors -->
    <link rel="icon" href="data:image/x-icon;base64,">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --message-user: rgba(79, 172, 254, 0.2);
            --message-bot: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background animated blobs for premium feel */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -100px; left: -100px;
            border-radius: 50%;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: var(--secondary);
            bottom: -50px; right: -50px;
            border-radius: 50%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .chat-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 10px #22c55e;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: slideIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message p {
            margin-bottom: 8px;
        }

        .message p:last-child {
            margin-bottom: 0;
        }

        .message ul, .message ol {
            padding-left: 22px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .message li {
            margin-bottom: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--message-bot);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message.user {
            align-self: flex-end;
            background: var(--message-user);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(79, 172, 254, 0.2);
            color: var(--primary);
        }

        .chat-footer {
            padding: 20px;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
        }

        .input-group {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--message-bot);
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            margin-top: 5px;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Mobile Optimization */
        @media (max-width: 650px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="chat-container">
        <header class="chat-header">
            <div class="chat-header-info">
                <div class="bot-avatar">
                    <i class="fa-solid fa-user-doctor"></i>
                </div>
                <div>
                    <h1>MEDI_BOT</h1>
                    <span class="text-muted" style="font-size: 0.8rem;"><span class="status-dot"></span>Online</span>
                </div>
            </div>
        </header>

        <section class="chat-body" id="chat-body">
            <div class="message bot" style="border-left: 4px solid var(--primary); padding-left: 20px;">
                <h3 style="margin-bottom: 8px; font-weight: 600; color: var(--primary);">
                    <i class="fa-solid fa-stethoscope" style="margin-right: 8px;"></i>Welcome to MEDI_BOT
                </h3>
                <p style="opacity: 0.9; margin-bottom: 12px; font-size: 0.95rem;">Your highly advanced AI Medical Assistant.</p>
                <p style="color: var(--text-muted); font-size: 0.9rem;">How can I assist you with your health and wellness today?</p>
            </div>
            <div class="typing-indicator" id="typing-indicator">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </section>

        <footer class="chat-footer">
            <div class="input-group">
                <input type="text" id="user-input" class="chat-input" placeholder="Type your health question here..." autocomplete="off">
            </div>
            <button class="send-btn" id="send-btn" aria-label="Send Message">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </footer>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatBody = document.getElementById('chat-body');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const typingIndicator = document.getElementById('typing-indicator');

            function appendMessage(text, sender) {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message', sender);
                // Parse markdown into valid HTML
                msgDiv.innerHTML = marked.parse(text);
                
                // Insert before typing indicator
                chatBody.insertBefore(msgDiv, typingIndicator);
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            async function sendMessage() {
                const text = userInput.value.trim();
                if (!text) return;

                // Add user message
                appendMessage(text, 'user');
                userInput.value = '';
                
                // Show typing indicator
                typingIndicator.style.display = 'block';
                chatBody.scrollTop = chatBody.scrollHeight;

                try {
                    const response = await fetch('/get', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({ msg: text })
                    });
                    
                    const answer = await response.text();
                    
                    // Hide typing
                    typingIndicator.style.display = 'none';
                    
                    // Add bot message
                    if(answer) {
                        appendMessage(answer, 'bot');
                    } else {
                        appendMessage("Sorry, I couldn't process that.", 'bot');
                    }
                } catch (error) {
                    typingIndicator.style.display = 'none';
                    appendMessage("Error connecting to the server.", 'bot');
                    console.error("Error:", error);
                }
            }

            sendBtn.addEventListener('click', sendMessage);
            
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // Initial focus
            userInput.focus();
        });
    </script>
</body>
</html>
